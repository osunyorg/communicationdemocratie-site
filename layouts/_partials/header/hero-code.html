{{- $title := or .Params.header_text .Title -}}
{{- $subtitle := false -}}
{{ if .Params.header_text }}
  {{- $subtitle = printf "<p>%s</p>" .Title -}}
{{ end }}
{{ partial "header/hero.html" (dict
    "title" $title
    "image" .Params.image
    "subtitle" $subtitle
    "breadcrumb" true
    "context" .
)}}
